<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Analizador 39568_20</title>
<style>
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#30363d;
  --border:#30363d;--border2:#484f58;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --blue:#58a6ff;--green:#3fb950;--red:#f85149;
  --yellow:#d29922;--purple:#bc8cff;--orange:#ffa657;
  --font-mono:'JetBrains Mono','Fira Code','Courier New',monospace;
  --font-ui:'Segoe UI',system-ui,sans-serif;
  --radius:6px;--radius-lg:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:14px;min-height:100vh;display:flex;flex-direction:column}

/* ── top bar ── */
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:52px;flex-shrink:0}
.logo{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.logo-badge{background:var(--purple);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;letter-spacing:.5px}
.logo-sub{color:var(--text2);font-size:12px;font-weight:400}
header nav{margin-left:auto;display:flex;gap:4px}
.tab-btn{background:transparent;border:none;color:var(--text2);font-size:12px;padding:5px 12px;border-radius:var(--radius);cursor:pointer;transition:all .15s}
.tab-btn:hover{background:var(--bg3);color:var(--text)}
.tab-btn.active{background:var(--bg3);color:var(--blue)}

/* ── main layout ── */
main{display:flex;flex:1;overflow:hidden;min-height:0}
.panel-left{width:380px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column}
.panel-right{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ── editor area ── */
.editor-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;justify-content:space-between}
.editor-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.examples-select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;padding:3px 8px;border-radius:var(--radius);cursor:pointer}
.editor-wrap{position:relative;flex:1;overflow:hidden;display:flex}
textarea.code-input{
  flex:1;background:var(--bg);color:var(--text);border:none;outline:none;resize:none;
  font-family:var(--font-mono);font-size:13px;line-height:1.7;
  padding:16px;tab-size:2;
}
textarea.code-input::selection{background:#1c398e}

.run-bar{background:var(--bg2);border-top:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:center}
.btn{border:none;font-size:12px;font-weight:600;padding:6px 16px;border-radius:var(--radius);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-primary{background:var(--blue);color:#0d1117}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--border2)}
.status-pill{font-size:11px;padding:3px 10px;border-radius:999px;margin-left:auto}
.pill-ok{background:rgba(63,185,80,.15);color:var(--green)}
.pill-err{background:rgba(248,81,73,.15);color:var(--red)}
.pill-idle{background:var(--bg3);color:var(--text2)}

/* ── right panel tabs ── */
.output-tabs{background:var(--bg2);border-bottom:1px solid var(--border);display:flex;gap:0}
.out-tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text2);font-size:12px;padding:10px 16px;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px}
.out-tab:hover{color:var(--text);background:var(--bg3)}
.out-tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.badge-count{font-size:10px;background:var(--red);color:#fff;padding:1px 5px;border-radius:999px}

/* ── output panels ── */
.out-panel{display:none;flex:1;overflow:auto;padding:16px}
.out-panel.visible{display:block}

/* token table */
.token-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px}
.token-table th{text-align:left;padding:7px 10px;border-bottom:1px solid var(--border2);color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.5px;background:var(--bg2);position:sticky;top:0}
.token-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.token-table tr:hover td{background:var(--bg2)}
.tok-KW_OUTPUT{color:var(--purple)}
.tok-ID{color:var(--blue)}
.tok-NUMBER{color:var(--orange)}
.tok-TEXT{color:var(--green)}
.tok-ASSIGN,.tok-SEMICOLON,.tok-LPAREN,.tok-RPAREN,.tok-COMMA{color:var(--text2)}
.tok-ERROR{color:var(--red)}
.tok-EOF{color:var(--text3);font-style:italic}
.lex-val{color:var(--text)}

/* tree */
.tree-pre{font-family:var(--font-mono);font-size:12px;line-height:1.8;color:var(--text);white-space:pre}
.tree-node-Program{color:var(--purple)}
.tree-node-AssignmentStatement,.tree-node-OutputStatement{color:var(--blue)}
.tree-node-Constant,.tree-node-TextLiteral{color:var(--green)}
.tree-node-Number,.tree-node-Identifier{color:var(--orange)}

/* errors */
.error-list{display:flex;flex-direction:column;gap:8px}
.error-item{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:var(--radius);padding:10px 14px;font-size:12px;display:flex;gap:12px;align-items:flex-start}
.err-line{color:var(--red);font-weight:700;font-family:var(--font-mono);white-space:nowrap}
.err-msg{color:var(--text);line-height:1.5}
.no-errors{text-align:center;padding:40px;color:var(--green);font-size:13px}

/* interpretation */
.interp-section{margin-bottom:20px}
.interp-title{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--text2);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.js-code{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--font-mono);font-size:12px;line-height:1.8;overflow-x:auto}
.js-kw{color:var(--purple)}
.js-id{color:var(--blue)}
.js-str{color:var(--green)}
.js-num{color:var(--orange)}
.js-fn{color:var(--yellow)}
.output-lines{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:14px;font-family:var(--font-mono);font-size:12px;line-height:1.8}
.output-line::before{content:'> ';color:var(--text3)}
.output-line{color:var(--green)}
.var-table{width:100%;border-collapse:collapse;font-family:var(--font-mono);font-size:12px}
.var-table td{padding:5px 10px;border-bottom:1px solid var(--border)}
.var-name{color:var(--blue)}
.var-val-num{color:var(--orange)}
.var-val-str{color:var(--green)}

/* placeholder */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text3);gap:8px;font-size:13px}
.placeholder svg{opacity:.3}

/* scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">ANTLR4</span>
    Analizador de Sub-lenguaje JS
    <span class="logo-sub">— Tema 39568_20</span>
  </div>
</header>

<main>
  <!-- LEFT: editor -->
  <div class="panel-left">
    <div class="editor-header">
      <span class="editor-label">input.txt</span>

        Ejecute el analizador para ver la tabla de tokens
      </div>
      <table class="token-table" id="tokenTable" style="display:none">
        <thead><tr><th>Línea</th><th>Col</th><th>Token</th><th>Lexema</th></tr></thead>

        Interpretación disponible para entradas válidas

<script>
/* ════════════════════════════════════════════
   LEXER
════════════════════════════════════════════ */
const TT = {
  KW_OUTPUT:'KW_OUTPUT', ASSIGN:'ASSIGN', SEMICOLON:'SEMICOLON',
  LPAREN:'LPAREN', RPAREN:'RPAREN', COMMA:'COMMA',
  NUMBER:'NUMBER', TEXT:'TEXT', ID:'ID', EOF:'EOF', ERROR:'ERROR'
};

class Token { constructor(type,lexeme,line,col){this.type=type;this.lexeme=lexeme;this.line=line;this.col=col;} }

class Lexer {
  constructor(src){this.src=src;this.pos=0;this.line=1;this.col=1;this.errors=[];}
  peek(){return this.src[this.pos]||null;}
  advance(){const ch=this.src[this.pos++];if(ch==='\n'){this.line++;this.col=1;}else{this.col++;}return ch;}
  skipWS(){while(this.pos<this.src.length&&/\s/.test(this.peek()))this.advance();}
  readNum(sl,sc){let l='';while(this.peek()&&/[0-9]/.test(this.peek()))l+=this.advance();return new Token(TT.NUMBER,l,sl,sc);}
  readIdKw(sl,sc){let l='';while(this.peek()&&/[a-zA-Z0-9_]/.test(this.peek()))l+=this.advance();return new Token(l==='output'?TT.KW_OUTPUT:TT.ID,l,sl,sc);}
  readText(sl,sc){
    let l='"';this.advance();
    while(this.pos<this.src.length&&this.peek()!=='"'){
      if(this.peek()==='\n'){this.errors.push({line:sl,msg:'Cadena sin cerrar (falta ")'});return new Token(TT.ERROR,l,sl,sc);}
      l+=this.advance();
    }
    if(this.peek()==='"'){l+=this.advance();return new Token(TT.TEXT,l,sl,sc);}
    this.errors.push({line:sl,msg:'Cadena sin cerrar (falta ")'});return new Token(TT.ERROR,l,sl,sc);
  }
  tokenize(){
    const tokens=[];
    while(this.pos<this.src.length){
      this.skipWS();if(this.pos>=this.src.length)break;
      const sl=this.line,sc=this.col,ch=this.peek();
      if(/[0-9]/.test(ch))tokens.push(this.readNum(sl,sc));
      else if(/[a-zA-Z]/.test(ch))tokens.push(this.readIdKw(sl,sc));
      else if(ch==='"')tokens.push(this.readText(sl,sc));
      else if(ch==='='){this.advance();tokens.push(new Token(TT.ASSIGN,'=',sl,sc));}
      else if(ch===';'){this.advance();tokens.push(new Token(TT.SEMICOLON,';',sl,sc));}
      else if(ch==='('){this.advance();tokens.push(new Token(TT.LPAREN,'(',sl,sc));}
      else if(ch===')'){this.advance();tokens.push(new Token(TT.RPAREN,')',sl,sc));}
      else if(ch===','){this.advance();tokens.push(new Token(TT.COMMA,',',sl,sc));}
      else{this.advance();this.errors.push({line:sl,msg:`Carácter desconocido: '${ch}'`});tokens.push(new Token(TT.ERROR,ch,sl,sc));}
    }
    tokens.push(new Token(TT.EOF,'<EOF>',this.line,this.col));
    return tokens;
  }
}

/* ════════════════════════════════════════════
   PARSER
════════════════════════════════════════════ */
function node(type,children=[],token=null){return{type,children,token};}

class Parser {
  constructor(tokens){this.tokens=tokens;this.pos=0;this.errors=[];}
  peek(){return this.tokens[this.pos];}
  advance(){return this.tokens[this.pos<this.tokens.length-1?this.pos++:this.pos];}
  expect(type,ctx){
    const t=this.peek();
    if(t.type===type)return this.advance();
    this.errors.push({line:t.line,msg:`[${ctx}] Se esperaba '${type}', se encontró '${t.type}' ("${t.lexeme}")`});
    return null;
  }
  parseProgram(){
    const stmts=[];
    while(this.peek().type!==TT.EOF){
      const prev=this.pos;
      const stmt=this.parseSimpleStatement();
      if(stmt)stmts.push(stmt);
      if(this.pos===prev){const bad=this.advance();this.errors.push({line:bad.line,msg:`Token inesperado: '${bad.lexeme}'`});}
    }
    return node('Program',stmts);
  }
  parseSimpleStatement(){
    const t=this.peek();
    if(t.type===TT.KW_OUTPUT)return this.parseOutput();
    if(t.type===TT.ID)return this.parseAssign();
    this.errors.push({line:t.line,msg:`Inicio de sentencia inválido: '${t.lexeme}'`});
    return null;
  }
  parseAssign(){
    const id=this.expect(TT.ID,'AssignmentStatement');
    const eq=this.expect(TT.ASSIGN,'AssignmentStatement');
    const val=this.parseConstant();
    const sc=this.expect(TT.SEMICOLON,'AssignmentStatement');
    const ch=[];
    if(id)ch.push(node('Identifier',[],id));
    if(eq)ch.push(node('=',[],eq));
    if(val)ch.push(val);
    if(sc)ch.push(node(';',[],sc));
    return node('AssignmentStatement',ch);
  }
  parseOutput(){
    const kw=this.expect(TT.KW_OUTPUT,'OutputStatement');
    const lp=this.expect(TT.LPAREN,'OutputStatement');
    const txt=this.parseTextLiteral('OutputStatement');
    const rp=this.expect(TT.RPAREN,'OutputStatement');
    const cm=this.expect(TT.COMMA,'OutputStatement');
    const ch=[];
    if(kw)ch.push(node('output',[],kw));
    if(lp)ch.push(node('(',[],lp));
    if(txt)ch.push(txt);
    if(rp)ch.push(node(')',[],rp));
    if(cm)ch.push(node(',',[],cm));
    return node('OutputStatement',ch);
  }
  parseConstant(){
    const t=this.peek();
    if(t.type===TT.NUMBER){this.advance();return node('Constant',[node('Number',[],t)],t);}
    if(t.type===TT.TEXT){this.advance();return node('Constant',[node('TextLiteral',[],t)],t);}
    this.errors.push({line:t.line,msg:`Se esperaba Number o TextLiteral, se encontró '${t.type}' ("${t.lexeme}")`});
    return null;
  }
  parseTextLiteral(ctx){
    const t=this.peek();
    if(t.type===TT.TEXT){this.advance();return node('TextLiteral',[],t);}
    this.errors.push({line:t.line,msg:`[${ctx}] Se esperaba TextLiteral, se encontró '${t.type}' ("${t.lexeme}")`});
    return null;
  }
  parse(){return this.parseProgram();}
}

/* ════════════════════════════════════════════
   TREE PRINTER
════════════════════════════════════════════ */
function printTree(n,prefix='',isLast=true){
  if(!n)return'';
  const conn=isLast?'└── ':'├── ';
  const label=n.token?`${n.type}  [${n.token.lexeme}]`:n.type;
  const colorClass=`tree-node-${n.type}`.replace(/[^a-zA-Z0-9-_]/g,'');
  const cp=prefix+(isLast?'    ':'│   ');
  let out=`<span class="${colorClass}">${prefix}${conn}${escH(label)}</span>\n`;
  n.children.forEach((ch,i)=>{out+=printTree(ch,cp,i===n.children.length-1);});
  return out;
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ════════════════════════════════════════════
   INTERPRETER
════════════════════════════════════════════ */
class Interpreter {
  constructor(ast){this.ast=ast;this.env={};this.outputs=[];this.jsLines=[];}
  run(){
    for(const s of this.ast.children)this.execStmt(s);
    return{env:this.env,outputs:this.outputs,jsCode:this.jsLines.join('\n')};
  }
  execStmt(s){
    if(!s)return;
    if(s.type==='AssignmentStatement')this.execAssign(s);
    else if(s.type==='OutputStatement')this.execOutput(s);
  }
  execAssign(s){
    const idN=s.children.find(c=>c.type==='Identifier');
    const valN=s.children.find(c=>c.type==='Constant');
    if(!idN||!valN)return;
    const name=idN.token.lexeme;
    const cc=valN.children[0];
    let v;
    if(cc.type==='Number')v=parseInt(cc.token.lexeme,10);
    else v=cc.token.lexeme;
    this.env[name]=v;
    this.jsLines.push(`let ${name} = ${v};`);
  }
  execOutput(s){
    const tn=s.children.find(c=>c.type==='TextLiteral');
    if(!tn)return;
    const raw=tn.token.lexeme;
    const text=raw.slice(1,raw.length-1);
    this.outputs.push(text);
    this.jsLines.push(`console.log(${raw});`);
  }
}

/* ════════════════════════════════════════════
   UI HELPERS
════════════════════════════════════════════ */
function highlightJS(code){
  return escH(code)
    .replace(/\b(let|const|var|console)\b/g,'<span class="js-kw">$1</span>')
    .replace(/\b(log)\b/g,'<span class="js-fn">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*")/g,'<span class="js-str">$1</span>')
    .replace(/\b(\d+)\b/g,'<span class="js-num">$1</span>');
}

/* ════════════════════════════════════════════
   EXAMPLES
════════════════════════════════════════════ */
const EXAMPLES = {
  correct1:`x = 42;\nnombre = "Juan";\noutput("Hola mundo"),\nedad = 25;\noutput("Fin del programa"),`,
  correct2:`valor1 = 100;\nvalor2 = 200;\nresultado = 999;\noutput("Suma calculada"),\nmensaje = "OK";\noutput("Proceso exitoso"),`,
  error1:`x = 42\nnombre = "Juan";\noutput("Hola"),`,
  error2:`x = 10;\noutput("inicio")\nnombre = "error";\noutput("Falta coma al final"),`,
};

/* ════════════════════════════════════════════
   MAIN RUN
════════════════════════════════════════════ */
function runAnalysis(){
  const src=document.getElementById('codeInput').value;

  // ── Lex ──────────────────────────────────
  const lexer=new Lexer(src);
  const tokens=lexer.tokenize();

  // ── Parse ────────────────────────────────
  const parser=new Parser(tokens);
  const ast=parser.parse();

  const lexErrors=lexer.errors;
  const synErrors=parser.errors;
  const allErrors=[...lexErrors,...synErrors];

  // ── Status pill ──────────────────────────
  const pill=document.getElementById('statusPill');
  if(allErrors.length===0){
    pill.textContent='✅ Sin errores';pill.className='status-pill pill-ok';
  } else {
    pill.textContent=`❌ ${allErrors.length} error${allErrors.length>1?'es':''}`;pill.className='status-pill pill-err';
  }

  // ── Error badge ──────────────────────────
  const badge=document.getElementById('errCount');
  if(allErrors.length>0){badge.textContent=allErrors.length;badge.style.display='inline';}
  else{badge.style.display='none';}

  // ── TOKEN TABLE ──────────────────────────
  document.getElementById('tokensPlaceholder').style.display='none';
  const tbl=document.getElementById('tokenTable');tbl.style.display='table';
  const tbody=document.getElementById('tokenBody');tbody.innerHTML='';
  tokens.forEach(t=>{
    const tr=document.createElement('tr');
    const cls=`tok-${t.type}`;
    tr.innerHTML=`<td>${t.line}</td><td>${t.col}</td><td class="${cls}">${t.type}</td><td class="${cls} lex-val">${escH(t.lexeme)}</td>`;
    tbody.appendChild(tr);
  });

  // ── ERRORS PANEL ─────────────────────────
  const ec=document.getElementById('errorsContent');
  if(allErrors.length===0){
    ec.innerHTML='<div class="no-errors">✅ La entrada no contiene errores léxicos ni sintácticos.</div>';
  } else {
    ec.innerHTML='<div class="error-list">'+allErrors.map(e=>
      `<div class="error-item"><span class="err-line">Línea&nbsp;${e.line}</span><span class="err-msg">${escH(e.msg)}</span></div>`
    ).join('')+'</div>';
  }

  // ── TREE PANEL ───────────────────────────
  const tc=document.getElementById('treeContent');
  tc.innerHTML=printTree(ast);

  // ── INTERPRETATION ───────────────────────
  const ph=document.getElementById('interpPlaceholder');
  const ic=document.getElementById('interpContent');
  if(allErrors.length===0){
    ph.style.display='none';ic.style.display='block';
    const interp=new Interpreter(ast);
    const res=interp.run();

    let html='';
    html+=`<div class="interp-section"><div class="interp-title">Código JavaScript generado</div>`;
    html+=`<div class="js-code">${res.jsCode.split('\n').map(highlightJS).join('<br>')}</div></div>`;

    html+=`<div class="interp-section"><div class="interp-title">Salida (console.log / output)</div>`;
    html+=`<div class="output-lines">`;
    if(res.outputs.length===0)html+='<span style="color:var(--text3)">Sin salidas</span>';
    else res.outputs.forEach(o=>{html+=`<div class="output-line">${escH(o)}</div>`;});
    html+=`</div></div>`;

    if(Object.keys(res.env).length>0){
      html+=`<div class="interp-section"><div class="interp-title">Variables en memoria</div>`;
      html+=`<table class="var-table">`;
      Object.entries(res.env).forEach(([k,v])=>{
        const vc=typeof v==='number'?'var-val-num':'var-val-str';
        html+=`<tr><td class="var-name">${escH(k)}</td><td class="${vc}">${escH(String(v))}</td></tr>`;
      });
      html+=`</table></div>`;
    }
    ic.innerHTML=html;
  } else {
    ph.style.display='flex';ic.style.display='none';
    ph.innerHTML='<span style="font-size:32px">⛔</span><span>No se puede interpretar: existen errores en la entrada.</span>';
  }
}

/* ════════════════════════════════════════════
   EVENTS
════════════════════════════════════════════ */
document.getElementById('runBtn').addEventListener('click',runAnalysis);
document.getElementById('clearBtn').addEventListener('click',()=>{
  document.getElementById('codeInput').value='';
  document.getElementById('statusPill').textContent='Listo';
  document.getElementById('statusPill').className='status-pill pill-idle';
  document.getElementById('errCount').style.display='none';
  document.getElementById('tokensPlaceholder').style.display='flex';
  document.getElementById('tokenTable').style.display='none';
  document.getElementById('errorsContent').innerHTML='';
  document.getElementById('treeContent').innerHTML='<span style="color:var(--text3)">Árbol aparecerá aquí tras el análisis…</span>';
  document.getElementById('interpPlaceholder').style.display='flex';
  document.getElementById('interpPlaceholder').innerHTML=`<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="5 3 19 12 5 21 5 3"/></svg><span>Interpretación disponible para entradas válidas</span>`;
  document.getElementById('interpContent').style.display='none';
  document.getElementById('exampleSelect').value='';
});

document.querySelectorAll('.out-tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.out-tab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.out-panel').forEach(p=>p.classList.remove('visible'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.panel).classList.add('visible');
  });
});

document.getElementById('exampleSelect').addEventListener('change',function(){
  if(!this.value)return;
  document.getElementById('codeInput').value=EXAMPLES[this.value]||'';
  runAnalysis();
});

document.getElementById('codeInput').addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart,en=e.target.selectionEnd;e.target.value=e.target.value.substring(0,s)+'  '+e.target.value.substring(en);e.target.selectionStart=e.target.selectionEnd=s+2;}
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){runAnalysis();}
});
</script>
